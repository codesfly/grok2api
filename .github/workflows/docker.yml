name: Build Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/${{ github.repository_owner }}/grok2api
            context: .
          - image: ghcr.io/${{ github.repository_owner }}/statsig-signer
            context: statsig-signer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' }}
            type=raw,value={{date 'YYYYMMDD' tz='Asia/Shanghai'}}-${{ github.run_number }},enable=${{ github.ref_type == 'branch' }}
            type=ref,event=tag
            type=semver,pattern={{version}}

      # 设备是 x86_64 软路由，只构建 linux/amd64：arm64 需在 QEMU 下编译
      # curl-cffi 的 rust wheel，极慢。将来要跑 ARM 再加回 linux/arm64。
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true
